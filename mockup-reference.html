<title>GTFS-RT — katalog nagrań (mockup)</title>
<style>
  :root {
    --paper: #ffffff;
    --paper-raised: #eef3f0;
    --paper-raised-2: #e3ece5;
    --ink: #16241c;
    --ink-muted: #4d5c53;
    --line: #d7e2dc;
    --green: #2e7d32;
    --green-ink: #1b5e20;
    --green-soft: #e3f1e3;
    --blue: #0277bd;
    --blue-soft: #e1f3fb;
    --amber: #a6650a;
    --amber-soft: #fbeed9;
    --focus: #0277bd;
    --mono: ui-monospace, "Cascadia Mono", "Roboto Mono", Consolas, Menlo, monospace;
    --sans: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  :root[data-theme="dark"] {
    --paper: #1b1f24; --paper-raised: #242a30; --paper-raised-2: #2c333a;
    --ink: #e7ebe8; --ink-muted: #9aa8a1; --line: #3a434b;
    --green: #66bb6a; --green-ink: #9ccc9f; --green-soft: #253328;
    --blue: #4fc3f7; --blue-soft: #1c2e36;
    --amber: #e0ab52; --amber-soft: #362c1a; --focus: #4fc3f7;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --paper: #1b1f24; --paper-raised: #242a30; --paper-raised-2: #2c333a;
      --ink: #e7ebe8; --ink-muted: #9aa8a1; --line: #3a434b;
      --green: #66bb6a; --green-ink: #9ccc9f; --green-soft: #253328;
      --blue: #4fc3f7; --blue-soft: #1c2e36;
      --amber: #e0ab52; --amber-soft: #362c1a; --focus: #4fc3f7;
    }
  }

  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--sans); background: var(--paper); color: var(--ink); font-size: 15px; line-height: 1.5; }
  a { color: var(--blue); }

  .topbar {
    display: flex; align-items: baseline; justify-content: space-between; gap: 1rem;
    padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5; background: var(--paper);
  }
  .brand { display: flex; align-items: baseline; gap: 0.6rem; }
  .brand .mark { font-weight: 800; letter-spacing: -0.01em; color: var(--green); font-size: 1.15rem; }
  .brand .sub { color: var(--ink-muted); font-size: 0.85rem; }
  .badge {
    font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.02em; text-transform: uppercase;
    padding: 0.2rem 0.5rem; border-radius: 3px; border: 1px solid var(--line); color: var(--ink-muted);
  }

  main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1.5rem 3.5rem; }

  .crumbs { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; font-size: 0.95rem; margin-bottom: 0.6rem; }
  .crumbs button { background: none; border: none; font: inherit; color: var(--blue); cursor: pointer; padding: 0.1rem 0.15rem; }
  .crumbs button:disabled { color: var(--ink); font-weight: 700; cursor: default; }
  .crumbs .sep { color: var(--ink-muted); }

  .page-title { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.01em; margin: 0 0 1rem; }

  .controls { display: flex; gap: 0.6rem; align-items: center; margin-bottom: 1.1rem; }
  .search {
    flex: 1 1 auto; display: flex; align-items: center; gap: 0.5rem;
    border: 1px solid var(--line); border-radius: 7px; padding: 0.5rem 0.75rem; background: var(--paper-raised);
  }
  .search input { border: none; background: none; outline: none; color: var(--ink); font: inherit; width: 100%; }
  .search svg { flex: none; opacity: 0.55; }

  /* --- card grid (cities / months) ------------------------------------------------------ */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; }
  .card {
    text-align: left; cursor: pointer; border: 1px solid var(--line); border-radius: 10px;
    padding: 1rem 1.1rem; background: var(--paper-raised); display: flex; flex-direction: column; gap: 0.5rem;
    font: inherit; color: var(--ink); width: 100%;
  }
  .card:hover { border-color: var(--blue); background: var(--paper-raised-2); }
  .card:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .card .title { font-size: 1.05rem; font-weight: 700; display: flex; justify-content: space-between; align-items: baseline; }
  .card .title .arrow { color: var(--ink-muted); font-weight: 400; }
  .card .meta { font-family: var(--mono); font-size: 0.78rem; color: var(--ink-muted); }
  .card .row-stats { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .pill {
    display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; font-family: var(--mono);
    padding: 0.15rem 0.5rem; border-radius: 999px; background: var(--green-soft); color: var(--green-ink); white-space: nowrap;
  }
  .pill.warn { background: var(--amber-soft); color: var(--amber); }
  .pill.muted { background: var(--paper-raised-2); color: var(--ink-muted); }

  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 9px; }
  table { border-collapse: collapse; width: 100%; min-width: 640px; }
  thead th {
    position: sticky; top: 52px; background: var(--paper-raised); text-align: left; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--line); white-space: nowrap;
  }
  thead th button {
    background: none; border: none; color: inherit; font: inherit; text-transform: inherit; letter-spacing: inherit;
    cursor: pointer; display: flex; align-items: center; gap: 0.25rem; padding: 0;
  }
  thead th button[aria-sort="ascending"]::after { content: " ▲"; font-size: 0.65rem; }
  thead th button[aria-sort="descending"]::after { content: " ▼"; font-size: 0.65rem; }
  tbody td { padding: 0.55rem 0.7rem; border-bottom: 1px solid var(--line); vertical-align: middle; white-space: nowrap; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.day-row { cursor: pointer; }
  tbody tr.day-row:hover { background: var(--paper-raised); }
  tbody tr.day-row:focus-visible { outline: 2px solid var(--focus); outline-offset: -2px; }
  td.date, td.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .cov { color: var(--ink-muted); font-family: var(--mono); font-size: 0.85rem; }

  .dl { display: flex; gap: 0.35rem; }
  .dl a {
    font-family: var(--mono); font-size: 0.72rem; text-decoration: none; color: var(--blue);
    background: var(--blue-soft); padding: 0.2rem 0.45rem; border-radius: 5px; border: 1px solid transparent;
  }
  .dl a:hover { border-color: var(--blue); }

  .empty { padding: 2.5rem 1rem; text-align: center; color: var(--ink-muted); }

  .note {
    margin-top: 1.75rem; padding: 0.9rem 1rem; border: 1px dashed var(--line); border-radius: 9px;
    background: var(--paper-raised); font-size: 0.85rem; color: var(--ink-muted);
  }
  .note b { color: var(--ink); }
  .note code { font-family: var(--mono); font-size: 0.82em; }

  details.manifest { margin-top: 1.25rem; border: 1px solid var(--line); border-radius: 9px; background: var(--paper-raised); }
  details.manifest summary { cursor: pointer; padding: 0.7rem 1rem; font-weight: 600; font-size: 0.9rem; }
  details.manifest pre { margin: 0; padding: 0 1rem 1rem; font-family: var(--mono); font-size: 0.78rem; overflow-x: auto; color: var(--ink-muted); }

  /* --- day detail view ------------------------------------------------------------------ */
  .detail-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
  .detail-date { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.01em; margin: 0; }
  .detail-head .cov { font-size: 0.9rem; }

  .stat-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.25rem; }
  .stat-tile { border: 1px solid var(--line); border-radius: 10px; padding: 0.75rem 0.9rem; background: var(--paper-raised); }
  .stat-tile .stat-value { font-size: 1.4rem; font-weight: 700; font-variant-numeric: normal; }
  .stat-tile .stat-label { font-size: 0.76rem; color: var(--ink-muted); margin-top: 0.15rem; }
  @media (max-width: 560px) { .stat-tiles { grid-template-columns: 1fr; } }

  .chart-card { border: 1px solid var(--line); border-radius: 10px; padding: 1rem 1.1rem; background: var(--paper-raised); margin-bottom: 1.25rem; }
  .chart-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.65rem; }
  .chart-img-wrap { position: relative; }
  .chart-img { width: 100%; display: block; border-radius: 8px; background: var(--paper); }
  .chart-fallback {
    display: none; flex-direction: column; gap: 0.5rem; align-items: center; justify-content: center;
    min-height: 180px; border: 1px dashed var(--line); border-radius: 8px; color: var(--ink-muted);
    font-size: 0.85rem; text-align: center; padding: 1rem;
  }
  .chart-caption { font-size: 0.78rem; color: var(--ink-muted); margin: 0.7rem 0 0; }
  .chart-caption code { font-family: var(--mono); }
  .chart-caption a { color: var(--blue); }

  .downloads-detail { display: flex; flex-direction: column; gap: 0.5rem; }
  .dl-detail {
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; text-decoration: none;
    border: 1px solid var(--line); border-radius: 9px; padding: 0.65rem 0.9rem; background: var(--paper-raised); color: var(--ink);
  }
  .dl-detail:hover { border-color: var(--blue); background: var(--paper-raised-2); }
  .dl-detail .dl-name { font-weight: 600; font-size: 0.9rem; }
  .dl-detail .dl-file { font-family: var(--mono); font-size: 0.74rem; color: var(--ink-muted); }
  .dl-detail .dl-go { color: var(--blue); font-family: var(--mono); font-size: 0.8rem; }
</style>

<div class="topbar">
  <div class="brand">
    <span class="mark">GISBoost</span>
    <span class="sub">/ katalog nagrań GTFS-RT</span>
  </div>
  <span class="badge">mockup — dane przykładowe</span>
</div>

<main>
  <div class="crumbs" id="crumbs"></div>
  <h1 class="page-title" id="pageTitle"></h1>
  <div class="controls">
    <label class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="q" type="text" placeholder="Szukaj…" />
    </label>
  </div>
  <div id="content"></div>
  <div class="note" id="scopeNote"></div>
  <details class="manifest">
    <summary>Podgląd manifest.json zasilającego ten widok</summary>
    <pre id="manifestPreview"></pre>
  </details>
</main>

<script>
  // --- Sample manifest data (illustrative — NOT real recordings) -----------------------------
  const REPO = "GISBoost/easy-GTFS-RT";
  const TODAY = "2026-07-19";
  const assetUrl = (tag, file) => `https://github.com/${REPO}/releases/download/${tag}/${file}`;
  const MONTHS_PL = ["styczeń","luty","marzec","kwiecień","maj","czerwiec","lipiec","sierpień","wrzesień","październik","listopad","grudzień"];

  function day(date, coverage, dirs, matched, corrected, partial) {
    const tag = "{city}-realized-" + date + "-phone";
    return {
      date, coverage, dirs, matched, corrected, status: partial ? "partial" : "ok", tag,
      assets: {
        p50: "{city}_realized_" + date + "_p50.zip",
        p85: "{city}_realized_" + date + "_p85.zip",
        static: "{city}_static_gtfs_" + date + ".zip",
        chart: "{city}_diff_" + date + "_p50_chart.png",
        summary: "{city}_diff_" + date + "_p50_summary.csv",
      },
    };
  }
  function city(id, display, days) { return { id, display, days }; }

  const manifest = [
    city("lodz", "Łódź", [
      day("2026-05-04", "06:01-21:59", 3, 14210, 731, false),
      day("2026-05-05", "06:00-22:00", 1, 15330, 802, false),
      day("2026-06-12", "06:00-21:47", 2, 13980, 690, true),
      day("2026-07-16", "06:02-22:00", 1, 16110, 845, false),
      day("2026-07-17", "06:00-22:00", 1, 15870, 820, false),
      day("2026-07-18", "06:00-22:00", 1, 16040, 838, false),
    ]),
    city("poznan", "Poznań", [
      day("2026-06-01", "06:00-22:00", 1, 12980, 610, false),
      day("2026-07-16", "06:00-22:00", 2, 13410, 655, false),
      day("2026-07-17", "06:00-22:00", 1, 13290, 648, false),
      day("2026-07-18", "06:00-21:52", 1, 13100, 630, true),
    ]),
    city("szczecin", "Szczecin", [
      day("2026-06-20", "06:00-22:00", 1, 9820, 402, false),
      day("2026-07-10", "06:00-22:00", 1, 9990, 410, false),
    ]),
    city("prague", "Prague", [
      day("2026-07-15", "06:00-22:00", 1, 28430, 1290, false),
      day("2026-07-17", "06:00-22:00", 1, 28990, 1310, false),
      day("2026-07-18", "06:00-22:00", 1, 28710, 1305, false),
    ]),
    city("rome", "Rome", [
      day("2026-07-16", "06:00-22:00", 1, 33210, 1502, false),
      day("2026-07-17", "06:00-22:00", 1, 33890, 1540, false),
      day("2026-07-18", "06:00-22:00", 1, 33660, 1528, false),
    ]),
    city("turin", "Turin", [
      day("2026-07-16", "06:00-22:00", 1, 19230, 880, false),
      day("2026-07-18", "06:00-22:00", 1, 19410, 891, false),
    ]),
    city("vilnius", "Vilnius", [
      day("2026-07-15", "06:00-22:00", 1, 11020, 470, false),
      day("2026-07-17", "06:00-22:00", 1, 11340, 486, false),
      day("2026-07-18", "06:00-22:00", 1, 11290, 481, false),
    ]),
    city("sofia", "Sofia", [
      day("2026-07-16", "06:00-22:00", 1, 14780, 602, false),
      day("2026-07-18", "06:00-22:00", 1, 14950, 611, false),
    ]),
    city("bucharest", "Bucharest", [
      day("2026-07-16", "06:00-22:00", 2, 22110, 940, false),
      day("2026-07-17", "06:00-22:00", 1, 22430, 958, false),
      day("2026-07-18", "06:00-22:00", 1, 22380, 951, false),
    ]),
    city("lisbon", "Lisbon", [
      day("2026-07-05", "06:00-22:00", 1, 17650, 738, false),
      day("2026-07-16", "06:00-22:00", 1, 17890, 745, false),
    ]),
    city("boston", "Boston", [
      day("2026-07-16", "06:00-22:00", 1, 24310, 1080, false),
      day("2026-07-17", "06:00-22:00", 1, 24680, 1102, false),
      day("2026-07-18", "06:00-22:00", 1, 24590, 1097, false),
    ]),
    city("brisbane", "Brisbane", [
      day("2026-07-16", "06:00-22:00", 1, 8110, 340, false),
      day("2026-07-18", "06:00-22:00", 1, 8240, 348, false),
    ]),
  ];

  manifest.forEach(c => {
    c.days.forEach(d => {
      d.tag = d.tag.replace(/\{city\}/g, c.id);
      for (const k in d.assets) d.assets[k] = d.assets[k].replace(/\{city\}/g, c.id);
    });
    c.days.sort((a, b) => a.date.localeCompare(b.date));
  });

  // --- navigation state: a real drill-down, one level deep at a time -------------------------
  // state.level: "cities" | "months" | "days" | "detail"
  let state = { level: "cities", cityId: null, month: null, date: null, q: "", sort: "date", dir: "asc" };

  function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }

  function cityMeta(c) {
    const dates = c.days.map(d => d.date).sort();
    const last = dates[dates.length - 1];
    return { first: dates[0], last, stale: daysBetween(last, TODAY), count: c.days.length };
  }
  function monthsFor(c) {
    const map = new Map();
    c.days.forEach(d => { const ym = d.date.slice(0, 7); if (!map.has(ym)) map.set(ym, []); map.get(ym).push(d); });
    return [...map.entries()].sort((a, b) => b[0].localeCompare(a[0]));
  }

  let crumbHandlers = [];
  function crumbBtn(label, current, handler) {
    const i = crumbHandlers.length; crumbHandlers.push(handler);
    return `<button data-i="${i}" ${current ? "disabled" : ""}>${label}</button>`;
  }
  function setCrumbs() {
    crumbHandlers = [];
    const parts = [];
    parts.push(crumbBtn("Wszystkie miasta", state.level === "cities", () => {
      state.level = "cities"; state.cityId = null; state.month = null; state.date = null; state.q = ""; render();
    }));
    if (state.cityId) {
      const c = manifest.find(m => m.id === state.cityId);
      parts.push('<span class="sep">/</span>');
      parts.push(crumbBtn(c.display, state.level === "months", () => {
        state.level = "months"; state.month = null; state.date = null; state.q = ""; render();
      }));
    }
    if (state.month) {
      const [y, m] = state.month.split("-");
      parts.push('<span class="sep">/</span>');
      parts.push(crumbBtn(`${MONTHS_PL[+m - 1]} ${y}`, state.level === "days", () => {
        state.level = "days"; state.date = null; state.q = ""; render();
      }));
    }
    if (state.date) {
      parts.push('<span class="sep">/</span>');
      parts.push(crumbBtn(state.date, true, () => {}));
    }
    const el = document.getElementById("crumbs");
    el.innerHTML = parts.join(" ");
    el.querySelectorAll("button[data-i]").forEach(btn => { btn.onclick = crumbHandlers[btn.dataset.i]; });
  }

  function render() {
    setCrumbs();
    const content = document.getElementById("content");
    const q = document.getElementById("q");
    const note = document.getElementById("scopeNote");
    const pageTitle = document.getElementById("pageTitle");
    q.style.display = state.level === "detail" ? "none" : "";
    document.querySelector(".controls").style.display = state.level === "detail" ? "none" : "flex";
    // detail level renders its own <h1> inline (the big date heading) — hide this generic one
    // so the page never carries two h1s for the same view at once.
    pageTitle.style.display = state.level === "detail" ? "none" : "block";

    if (state.level === "cities") {
      pageTitle.textContent = "Wszystkie miasta";
      q.placeholder = "Szukaj miasta…";
      let cities = manifest.slice().sort((a, b) => a.display.localeCompare(b.display, "pl"));
      const query = state.q.trim().toLowerCase();
      if (query) cities = cities.filter(c => c.display.toLowerCase().includes(query) || c.id.includes(query));

      content.innerHTML = !cities.length
        ? `<div class="empty">Brak miast pasujących do „${state.q}”.</div>`
        : `<div class="grid">${cities.map(c => {
            const m = cityMeta(c);
            const freshness = m.stale <= 1 ? `<span class="pill">✓ aktualne</span>`
              : m.stale <= 3 ? `<span class="pill warn">brak od ${m.stale} dni</span>`
              : `<span class="pill muted">brak od ${m.stale} dni</span>`;
            return `<button class="card" data-city="${c.id}">
                <div class="title"><span>${c.display}</span><span class="arrow">→</span></div>
                <div class="meta">${m.first} … ${m.last}</div>
                <div class="row-stats"><span class="pill muted">${m.count} dni</span>${freshness}</div>
              </button>`;
          }).join("")}</div>`;
      content.querySelectorAll("[data-city]").forEach(btn => {
        btn.onclick = () => { state.level = "months"; state.cityId = btn.dataset.city; state.q = ""; render(); };
      });
      note.innerHTML = `<b>Poziom 1 z 4:</b> miasta posortowane alfabetycznie. Kliknij, żeby zobaczyć miesiące.`;

    } else if (state.level === "months") {
      const cTitle = manifest.find(m => m.id === state.cityId);
      pageTitle.textContent = cTitle.display;
      q.placeholder = "Szukaj miesiąca (np. lipiec, 2026-06)…";
      const c = manifest.find(m => m.id === state.cityId);
      let months = monthsFor(c);
      const query = state.q.trim().toLowerCase();
      if (query) months = months.filter(([ym]) => ym.includes(query) || MONTHS_PL[+ym.slice(5,7)-1].includes(query));

      content.innerHTML = !months.length
        ? `<div class="empty">Brak miesięcy pasujących do „${state.q}”.</div>`
        : `<div class="grid">${months.map(([ym, days]) => {
            const [y, m] = ym.split("-");
            const partial = days.some(d => d.status === "partial");
            return `<button class="card" data-ym="${ym}">
                <div class="title"><span>${MONTHS_PL[+m - 1]} ${y}</span><span class="arrow">→</span></div>
                <div class="meta">${days[0].date} … ${days[days.length - 1].date}</div>
                <div class="row-stats"><span class="pill muted">${days.length} dni</span>${partial ? '<span class="pill warn">częściowe pokrycie</span>' : ""}</div>
              </button>`;
          }).join("")}</div>`;
      content.querySelectorAll("[data-ym]").forEach(btn => {
        btn.onclick = () => { state.level = "days"; state.month = btn.dataset.ym; state.q = ""; state.sort = "date"; state.dir = "asc"; render(); };
      });
      note.innerHTML = `<b>Poziom 2 z 4:</b> miesiące dla <b>${c.display}</b>, najnowszy na górze.`;

    } else if (state.level === "days") {
      const [titleY, titleM] = state.month.split("-");
      pageTitle.textContent = `${manifest.find(m => m.id === state.cityId).display} — ${MONTHS_PL[+titleM - 1]} ${titleY}`;
      q.placeholder = "Szukaj dnia (np. 07-16)…";
      const c = manifest.find(m => m.id === state.cityId);
      let days = c.days.filter(d => d.date.slice(0, 7) === state.month);
      const query = state.q.trim().toLowerCase();
      if (query) days = days.filter(d => d.date.includes(query));
      days = days.slice().sort((a, b) => {
        let av = a[state.sort], bv = b[state.sort];
        let cmp = av < bv ? -1 : av > bv ? 1 : 0;
        return state.dir === "asc" ? cmp : -cmp;
      });

      const sortInd = (key) => state.sort === key ? (state.dir === "asc" ? "ascending" : "descending") : "none";
      content.innerHTML = !days.length
        ? `<div class="empty">Brak dni pasujących do „${state.q}”.</div>`
        : `<div class="table-wrap"><table>
            <thead><tr>
              <th><button data-sort="date" aria-sort="${sortInd('date')}">Data</button></th>
              <th>Pokrycie</th>
              <th><button data-sort="matched" aria-sort="${sortInd('matched')}">Dopasowane obs.</button></th>
              <th><button data-sort="corrected" aria-sort="${sortInd('corrected')}">Skorygowane odc.</button></th>
              <th>Pliki</th>
            </tr></thead>
            <tbody>${days.map(d => `
              <tr class="day-row" data-date="${d.date}" tabindex="0" role="button" aria-label="Pokaż szczegóły i wykres dla ${d.date}">
                <td class="date">${d.date}</td>
                <td><span class="cov">${d.coverage}</span> ${d.status === "partial" ? '<span class="pill warn">częściowe</span>' : '<span class="pill">✓ zbudowane</span>'}</td>
                <td class="num">${d.matched.toLocaleString("pl-PL")}</td>
                <td class="num">${d.corrected.toLocaleString("pl-PL")}</td>
                <td><div class="dl" onclick="event.stopPropagation()">
                  <a href="${assetUrl(d.tag, d.assets.p50)}" target="_blank" rel="noopener">P50</a>
                  <a href="${assetUrl(d.tag, d.assets.p85)}" target="_blank" rel="noopener">P85</a>
                  <a href="${assetUrl(d.tag, d.assets.static)}" target="_blank" rel="noopener">static</a>
                  <a href="${assetUrl(d.tag, d.assets.chart)}" target="_blank" rel="noopener">diff</a>
                </div></td>
              </tr>`).join("")}</tbody>
          </table></div>`;
      content.querySelectorAll("thead button[data-sort]").forEach(btn => {
        btn.onclick = () => {
          const key = btn.dataset.sort;
          if (state.sort === key) state.dir = state.dir === "asc" ? "desc" : "asc"; else { state.sort = key; state.dir = "asc"; }
          render();
        };
      });
      content.querySelectorAll("tr.day-row").forEach(tr => {
        const open = () => { state.level = "detail"; state.date = tr.dataset.date; render(); };
        tr.onclick = open;
        tr.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } };
      });
      const [y, m] = state.month.split("-");
      note.innerHTML = `<b>Poziom 3 z 4:</b> dni w ${MONTHS_PL[+m - 1]} ${y} dla <b>${c.display}</b>, chronologicznie. Kliknij wiersz, żeby zobaczyć wykres tego dnia.`;

    } else if (state.level === "detail") {
      const c = manifest.find(m => m.id === state.cityId);
      const d = c.days.find(x => x.date === state.date);
      const statusPill = d.status === "partial" ? '<span class="pill warn">częściowe pokrycie</span>' : '<span class="pill">✓ zbudowane</span>';
      content.innerHTML = `
        <div class="detail-head">
          <div><h1 class="detail-date">${c.display} — ${d.date}</h1><span class="cov">Pokrycie: ${d.coverage}</span></div>
          ${statusPill}
        </div>
        <div class="stat-tiles">
          <div class="stat-tile"><div class="stat-value">${d.matched.toLocaleString('pl-PL')}</div><div class="stat-label">dopasowane obserwacje</div></div>
          <div class="stat-tile"><div class="stat-value">${d.corrected.toLocaleString('pl-PL')}</div><div class="stat-label">skorygowane odcinki</div></div>
          <div class="stat-tile"><div class="stat-value">${d.dirs}</div><div class="stat-label">katalog(i) nagrania</div></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Static vs realized — średnie opóźnienie wg czasu rozkładowego</div>
          <div class="chart-img-wrap">
            <img class="chart-img" loading="lazy"
                 src="${assetUrl(d.tag, d.assets.chart)}"
                 alt="Wykres średniego opóźnienia (zrealizowane minus rozkładowe) w funkcji czasu rozkładowego, ${c.display} ${d.date}"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="chart-fallback">
              <span>Obraz nie wczytał się pod tym adresem — to mockup, ten dzień/miasto nie ma prawdziwego release'u.</span>
              <a href="${assetUrl(d.tag, d.assets.chart)}" target="_blank" rel="noopener">Otwórz link mimo to ↗</a>
            </div>
          </div>
          <p class="chart-caption">Ten PNG nie jest renderowany przez tę stronę — to gotowy plik
            <code>${d.assets.chart}</code> z release'u <code>${d.tag}</code>, wygenerowany przez
            <code>tools/analysis/gtfs_static_vs_realized_diff.py</code> (matplotlib) bezpośrednio z różnicy
            statycznego i „zrealizowanego” GTFS — nie z CSV; CSV to osobny, równoległy eksport tych samych
            danych z tego samego przebiegu skryptu, nie źródło wykresu. Dostępna alternatywa danych (tabela):
            <a href="${assetUrl(d.tag, d.assets.summary)}" target="_blank" rel="noopener">${d.assets.summary}</a>.</p>
        </div>
        <div class="downloads-detail">
          ${dlRow("📦 GTFS skorygowany — mediana (P50)", d.assets.p50, assetUrl(d.tag, d.assets.p50))}
          ${dlRow("📦 GTFS skorygowany — 85. percentyl (P85)", d.assets.p85, assetUrl(d.tag, d.assets.p85))}
          ${dlRow("🗺️ Statyczny GTFS użyty do tego builda", d.assets.static, assetUrl(d.tag, d.assets.static))}
          ${dlRow("📈 Wykres static-vs-realized (PNG)", d.assets.chart, assetUrl(d.tag, d.assets.chart))}
          ${dlRow("📄 Zestawienie różnic (CSV)", d.assets.summary, assetUrl(d.tag, d.assets.summary))}
        </div>`;
      note.innerHTML = `<b>Poziom 4 z 4:</b> szczegóły jednego dnia — dokładnie te pliki, które dziś trafiają do release'u <code>${d.tag}</code>, wykres PNG osadzony wprost z tego release'u.`;
    }

    document.getElementById("manifestPreview").textContent = manifestSample();
  }

  function dlRow(name, file, url) {
    return `<a class="dl-detail" href="${url}" target="_blank" rel="noopener">
      <span><span class="dl-name">${name}</span><br/><span class="dl-file">${file}</span></span>
      <span class="dl-go">pobierz ↗</span>
    </a>`;
  }

  function manifestSample() {
    const sample = manifest.find(c => c.id === (state.cityId || "lodz"));
    const d = sample.days[sample.days.length - 1];
    return JSON.stringify({
      generated_at: TODAY + "T00:05:00Z",
      source_repo: REPO,
      cities: { [sample.id]: { display_name: sample.display, days: [{
        date: d.date, status: d.status, coverage: d.coverage, recording_dirs: d.dirs,
        observations_matched: d.matched, segments_corrected: d.corrected,
        release_tag: d.tag, release_url: `https://github.com/${REPO}/releases/tag/${d.tag}`,
        assets: {
          p50: assetUrl(d.tag, d.assets.p50), p85: assetUrl(d.tag, d.assets.p85),
          static_gtfs: assetUrl(d.tag, d.assets.static), diff_chart: assetUrl(d.tag, d.assets.chart),
          diff_summary: assetUrl(d.tag, d.assets.summary)
        }
      }] } }
    }, null, 2);
  }

  document.getElementById("q").addEventListener("input", (e) => { state.q = e.target.value; render(); });
  render();
</script>
