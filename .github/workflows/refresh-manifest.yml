name: Refresh manifest.json

on:
  schedule:
    # 08:00 UTC daily. Boston is the latest-finishing city; real published_at samples
    # show completions as late as 06:27 UTC, so this leaves a buffer plus slack for
    # GitHub's own scheduled-workflow delivery jitter. manifest.json is rebuilt from
    # scratch every run, so an unlucky day where Boston publishes even later than this
    # just means that city's newest day shows up one run later - self-healing, never a
    # permanent gap. Do NOT "simplify" this back to a single fixed midnight run - see
    # PRD.md section 3.7 / CLAUDE.md for why (Boston/Brisbane timezone precedent).
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-manifest
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ github.token }}
  SOURCE_REPO: GISBoost/easy-GTFS-RT

jobs:
  refresh:
    runs-on: ubuntu-latest
    # 15, not 10: the first run after GD-3 shipped fetches diff_summary.csv for every
    # existing day (no delay_stats cache yet in the previous manifest.json) - see the
    # "Fetch delay_stats" step below. Every run after that only fetches new days and
    # stays well under this, but the one-time backfill needs the extra headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Fetch config/cities.json (display names)
        run: |
          set -uo pipefail
          if ! curl -fsSL "https://raw.githubusercontent.com/${SOURCE_REPO}/main/config/cities.json" -o cities.json; then
            echo "::warning::Failed to fetch cities.json from ${SOURCE_REPO} - continuing with an empty mapping; every city's display_name will fall back to its raw city_id for this run."
            echo '{}' > cities.json
          fi
          if ! jq -e . cities.json >/dev/null 2>&1; then
            echo "::warning::cities.json fetched but was not valid JSON - falling back to {}"
            echo '{}' > cities.json
          fi

      - name: Fetch all releases (paginated)
        run: |
          set -euo pipefail
          gh api --paginate "repos/${SOURCE_REPO}/releases" > releases.json
          echo "Fetched $(jq 'length' releases.json) total releases from ${SOURCE_REPO}."

      - name: Parse releases (tag filter + best-effort body/asset extraction)
        run: |
          set -euo pipefail
          cat > parse.jq <<'JQ_EOF'
          def num_or_null(re):
            . as $body
            | (($body | capture(re)) // null) as $m
            | if $m == null then null else ($m.n | tonumber) end;

          def coverage_or_null:
            . as $body
            | (($body | capture("Actual recorded coverage: (?<n>[^.]+)\\.")) // null) as $m
            | if $m == null then null else ($m.n | split(", ")) end;

          def looks_like_range:
            test("^[0-2][0-9]:[0-5][0-9]-[0-2][0-9]:[0-5][0-9]$");

          def compute_status($ranges):
            if $ranges == null then "unknown"
            elif ($ranges | length) != 1 then "partial"
            elif ($ranges[0] | looks_like_range | not) then
              # Defensive: easy-GTFS-RT's own build workflow can legitimately emit the
              # literal body text "Actual recorded coverage: unknown." when a
              # recording directory has no parseable timestamps at all. That still
              # matches the regex above (captures the string "unknown"), producing a
              # single-element array that isn't an HH:MM-HH:MM range. Can't confidently
              # call this "ok"; "partial" is the safer conservative label.
              "partial"
            else
              ($ranges[0] | split("-")) as $se
              | if ($se[0] > "06:05") or ($se[1] < "21:55") then "partial" else "ok" end
            end;

          def find_asset($assets; $name):
            ($assets | map(select(.name == $name)) | first) as $a
            | if $a == null then null else $a.browser_download_url end;

          .[]
          | (.tag_name | capture("^(?<city>[a-z0-9_]+)-realized-(?<date>\\d{4}-\\d{2}-\\d{2})-phone$")) as $tag
          # Zero output above silently drops non-matching tags (positions-raw-*,
          # legacy tags missing the -phone suffix, unrelated tags, etc) - never an
          # error, per PRD.md section 3.2.
          | .body as $body
          | ($body | num_or_null("(?<n>\\d+) recording director")) as $recording_dirs
          | ($body | num_or_null("(?<n>\\d+) observations matched")) as $observations_matched
          | ($body | num_or_null("(?<n>\\d+) segments corrected")) as $segments_corrected
          | ($body | coverage_or_null) as $coverage_ranges
          | [
              (if $recording_dirs       == null then "recording_dirs"       else empty end),
              (if $observations_matched == null then "observations_matched" else empty end),
              (if $segments_corrected   == null then "segments_corrected"   else empty end),
              (if $coverage_ranges      == null then "coverage_ranges"      else empty end)
            ] as $warnings
          | {
              city: $tag.city,
              date: $tag.date,
              release_tag: .tag_name,
              release_url: (.html_url // "https://github.com/\(env.SOURCE_REPO)/releases/tag/\(.tag_name)"),
              # published_at, not created_at: every release built on the same calendar
              # day shares an identical created_at (reflects the underlying tag/commit
              # date, a known GitHub API quirk) - published_at tracks each release's
              # actual, distinct build moment. Do not "fix" this back to created_at.
              created_at: .published_at,
              recording_dirs: $recording_dirs,
              observations_matched: $observations_matched,
              segments_corrected: $segments_corrected,
              coverage_ranges: $coverage_ranges,
              status: (compute_status($coverage_ranges)),
              assets: {
                p50:          find_asset(.assets; "\($tag.city)_realized_\($tag.date)_p50.zip"),
                p85:          find_asset(.assets; "\($tag.city)_realized_\($tag.date)_p85.zip"),
                static_gtfs:  find_asset(.assets; "\($tag.city)_static_gtfs_\($tag.date).zip"),
                diff_chart:   find_asset(.assets; "\($tag.city)_diff_\($tag.date)_p50_chart.png"),
                diff_summary: find_asset(.assets; "\($tag.city)_diff_\($tag.date)_p50_summary.csv")
              },
              _warnings: $warnings
            }
          JQ_EOF
          jq -c -f parse.jq releases.json > parsed.jsonl
          echo "Parsed $(wc -l < parsed.jsonl) matching releases."

      - name: Log parse warnings for releases with unparseable body fields
        run: |
          set -uo pipefail
          while IFS= read -r line; do
            [ -n "$line" ] || continue
            warnings="$(jq -r '._warnings | join(", ")' <<< "$line")"
            if [ -n "$warnings" ]; then
              tag="$(jq -r '.release_tag' <<< "$line")"
              echo "::warning title=Unparseable release body::${tag}: could not parse [${warnings}] from the release body (regex mismatch against PRD.md section 3.3's expected format) - these fields are null for this release only, the rest of the run continues normally."
            fi
          done < parsed.jsonl
          exit 0

      - name: Fetch delay_stats from diff_summary.csv (cached by city/date)
        run: |
          set -uo pipefail
          # PRD.md section 8.1: delay_stats is sourced from each day's diff_summary.csv (the
          # single "ALL" row, not the per-route breakdown), but that CSV is a separate
          # per-day-per-city download - re-fetching every historical day's CSV on every run
          # would make this step's cost grow without bound as days accumulate. Instead, cache
          # by (city, date) against the *previous* manifest.json - still present in this
          # checkout, not yet overwritten by the Build step below - and only fetch a fresh CSV
          # for a day that doesn't already have a non-null cached value. Days that previously
          # had delay_stats: null (e.g. the CSV wasn't uploaded yet) are always retried, so a
          # late-uploaded asset self-heals on the next run without any special-case logic.
          if [ -f manifest.json ]; then
            jq -c '
              [ (.cities // {}) | to_entries[] | .key as $city | (.value.days // [])[]
                | select(.delay_stats != null)
                | { key: ($city + "|" + .date), value: .delay_stats } ]
              | from_entries
            ' manifest.json > delay_stats_cache.json 2>/dev/null
            if [ ! -s delay_stats_cache.json ] || ! jq -e . delay_stats_cache.json >/dev/null 2>&1; then
              echo '{}' > delay_stats_cache.json
            fi
          else
            echo '{}' > delay_stats_cache.json
          fi
          echo "Cached delay_stats for $(jq 'length' delay_stats_cache.json) (city,date) pair(s) from the previous manifest."

          is_number() { [[ "$1" =~ ^-?[0-9]+(\.[0-9]+)?$ ]]; }
          is_uint()   { [[ "$1" =~ ^[0-9]+$ ]]; }

          # Downloads one day's diff_summary.csv and extracts its "ALL" row (the aggregate
          # across all routes - see tools/analysis/gtfs_static_vs_realized_diff.py in easy-OTP,
          # read-only reference, not modified here). Any failure - download error, missing ALL
          # row, unexpected column shape - degrades only this one day's delay_stats to null and
          # logs a ::warning::, same best-effort philosophy as the body-field parsing above;
          # never fails the step or the run.
          fetch_and_parse_delay_stats() {
            local url="$1" city="$2" date="$3" csv_file all_row
            csv_file="$(mktemp)"
            if ! curl -fsSL "$url" -o "$csv_file"; then
              echo "::warning title=delay_stats fetch failed::${city} ${date}: could not download diff_summary.csv - delay_stats is null for this day only, will retry next run." >&2
              rm -f "$csv_file"
              echo "null"
              return
            fi
            # Match on the route_id field's value, not "last line" - robust to a trailing blank
            # line in the CSV.
            all_row="$(awk -F',' '$1=="ALL"{print; exit}' "$csv_file")"
            rm -f "$csv_file"
            if [ -z "$all_row" ]; then
              echo "::warning title=delay_stats parse failed::${city} ${date}: diff_summary.csv had no ALL row - delay_stats is null for this day only." >&2
              echo "null"
              return
            fi
            IFS=',' read -r route_id n_rows n_changed pct_changed mean_delay_sec mean_abs_delay_sec stdev_delay_sec min_delay_sec max_delay_sec <<< "$all_row"
            if ! is_uint "$n_rows" || ! is_uint "$n_changed" || ! is_number "$pct_changed" \
              || ! is_number "$mean_delay_sec" || ! is_number "$mean_abs_delay_sec" \
              || ! is_number "$stdev_delay_sec" || ! is_number "$min_delay_sec" || ! is_number "$max_delay_sec"; then
              echo "::warning title=delay_stats parse failed::${city} ${date}: diff_summary.csv's ALL row did not have the expected 9 numeric columns - delay_stats is null for this day only." >&2
              echo "null"
              return
            fi
            jq -n -c \
              --argjson n_rows "$n_rows" --argjson n_changed "$n_changed" --argjson pct_changed "$pct_changed" \
              --argjson mean_delay_sec "$mean_delay_sec" --argjson mean_abs_delay_sec "$mean_abs_delay_sec" \
              --argjson stdev_delay_sec "$stdev_delay_sec" --argjson min_delay_sec "$min_delay_sec" --argjson max_delay_sec "$max_delay_sec" \
              '{n_rows:$n_rows,n_changed:$n_changed,pct_changed:$pct_changed,mean_delay_sec:$mean_delay_sec,mean_abs_delay_sec:$mean_abs_delay_sec,stdev_delay_sec:$stdev_delay_sec,min_delay_sec:$min_delay_sec,max_delay_sec:$max_delay_sec}'
          }

          fetched=0
          reused=0
          : > parsed_with_stats.jsonl
          while IFS= read -r line; do
            [ -n "$line" ] || continue
            city="$(jq -r '.city' <<< "$line")"
            date="$(jq -r '.date' <<< "$line")"
            diff_summary_url="$(jq -r '.assets.diff_summary // empty' <<< "$line")"
            cached="$(jq -c --arg k "${city}|${date}" '.[$k] // empty' delay_stats_cache.json)"
            if [ -n "$cached" ] && [ "$cached" != "null" ]; then
              stats="$cached"
              reused=$((reused + 1))
            elif [ -z "$diff_summary_url" ]; then
              stats="null"
            else
              stats="$(fetch_and_parse_delay_stats "$diff_summary_url" "$city" "$date")"
              fetched=$((fetched + 1))
            fi
            jq -c --argjson stats "$stats" '. + {delay_stats: $stats}' <<< "$line" >> parsed_with_stats.jsonl
          done < parsed.jsonl
          echo "delay_stats: ${reused} reused from cache, ${fetched} fetched fresh this run."
          exit 0

      - name: Build manifest.json (group by city, sort days, merge display_name)
        run: |
          set -euo pipefail
          cat > build.jq <<'JQ_EOF'
          map(del(._warnings))
          | group_by(.city)
          | map({
              key: .[0].city,
              value: {
                display_name: ($cities[.[0].city].display_name // .[0].city),
                days: (map(del(.city)) | sort_by(.date))
              }
            })
          | from_entries
          | { generated_at: $generated_at, source_repo: $source_repo, cities: . }
          JQ_EOF
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -s \
            --argjson cities "$(cat cities.json)" \
            --arg generated_at "$GENERATED_AT" \
            --arg source_repo "$SOURCE_REPO" \
            -f build.jq parsed_with_stats.jsonl > manifest.json
          jq -e . manifest.json > /dev/null

      - name: Commit and push manifest.json if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -f is required: manifest.json is .gitignore'd so that a locally-copied dev
          # fixture never gets swept into a stray "git add -A" - CI generating and
          # committing the real one is the one intentional exception to that rule.
          # Diffing --cached (not a plain working-tree diff) is what correctly detects
          # "brand new file" on the very first run, not just "changed file" on later runs.
          git add -f manifest.json
          if git diff --cached --quiet -- manifest.json; then
            echo "No changes to manifest.json - skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh manifest.json"
          # This job's earlier steps (especially the diff_summary.csv fetch, GD-3) can take
          # long enough for someone else to push to main in the meantime - rebasing onto the
          # latest remote tip right before pushing avoids a non-fast-forward rejection. Our
          # commit only ever touches manifest.json, so this is conflict-free unless another
          # process committed a *different* manifest.json in that exact window - which the
          # concurrency: group above already prevents for this workflow's own runs.
          git fetch origin main
          git rebase origin/main
          git push
